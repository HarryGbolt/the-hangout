<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hangout – Youth Club</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --green: #2d6a2d;
    --green-bright: #4aaa4a;
    --pink: #e03060;
    --white: #f0f0f0;
    --grey: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
    opacity: 0.04; mix-blend-mode: overlay;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    padding: 1rem 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(74,170,74,0.22);
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.12em; }
  .nav-logo span { color: var(--pink); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--pink); }

  /* HERO */
  .hero {
    min-height: 100vh;
    background: var(--dark);
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
    padding: 100px 2rem 4rem;
  }

  .hero-art { position: absolute; inset: 0; width: 100%; height: 100%; display: block; overflow: hidden; }
  .hero-art svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(74,170,74,0.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,170,74,0.055) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  .torn-banner {
    position: relative; background: var(--black);
    padding: 1.2rem 3.5rem 1.6rem; margin-bottom: 1.2rem; z-index: 2;
    animation: slideDown 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }
  .torn-banner::before, .torn-banner::after {
    content: ''; position: absolute; left: 0; right: 0; height: 18px; background: var(--black);
  }
  .torn-banner::before {
    top: -16px;
    clip-path: polygon(0% 100%, 1.5% 20%, 4% 90%, 7% 5%, 10% 80%, 13% 10%, 16.5% 90%, 20% 5%, 23% 75%, 26% 15%, 29% 88%, 32% 5%, 35.5% 72%, 38% 10%, 41% 85%, 44% 0%, 47% 78%, 50% 10%, 53% 88%, 56% 5%, 59% 72%, 62% 15%, 65% 88%, 68% 5%, 71.5% 75%, 74.5% 12%, 78% 88%, 81% 5%, 84% 78%, 87% 12%, 90% 82%, 93% 10%, 96% 80%, 98.5% 25%, 100% 75%, 100% 100%);
  }
  .torn-banner::after {
    bottom: -16px;
    clip-path: polygon(0% 0%, 2% 85%, 5% 10%, 8% 88%, 11% 18%, 14% 92%, 17.5% 20%, 21% 88%, 24% 12%, 27% 85%, 30% 18%, 33% 92%, 36.5% 20%, 39.5% 88%, 42.5% 12%, 45.5% 85%, 48.5% 5%, 51.5% 88%, 54.5% 15%, 57.5% 90%, 60.5% 8%, 63.5% 80%, 66.5% 18%, 69.5% 88%, 72.5% 10%, 75.5% 85%, 78.5% 18%, 81.5% 90%, 84.5% 8%, 87.5% 82%, 90.5% 12%, 93.5% 85%, 96.5% 15%, 99% 78%, 100% 0%);
  }

  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 13vw, 9.5rem); letter-spacing: 0.04em; line-height: 0.88; text-align: center; position: relative; z-index: 2; }

  .pink-badge {
    background: var(--pink); display: inline-block;
    padding: 0.4rem 2.2rem 0.5rem;
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.4rem, 4vw, 2.1rem); letter-spacing: 0.18em;
    position: relative; z-index: 2; margin-bottom: 2.5rem;
    animation: slideDown 0.9s 0.1s cubic-bezier(0.16,1,0.3,1) both;
  }
  .pink-badge::before { content: ''; position: absolute; top: 0; bottom: 0; left: -11px; width: 14px; background: var(--pink); clip-path: polygon(100% 0%, 100% 100%, 0% 65%, 25% 0%); }
  .pink-badge::after { content: ''; position: absolute; top: 0; bottom: 0; right: -11px; width: 14px; background: var(--pink); clip-path: polygon(0% 0%, 75% 0%, 100% 65%, 0% 100%); }

  .hero-info { display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center; z-index: 2; margin-bottom: 2.5rem; animation: fadeUp 0.8s 0.3s both; }

  .info-chip {
    border: 2px solid var(--green-bright); padding: 0.6rem 1.4rem;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-bright);
    position: relative; overflow: hidden; transition: all 0.3s; z-index: 2;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .info-chip svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .info-chip::before { content: ''; position: absolute; inset: 0; background: var(--green); transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease; z-index: -1; }
  .info-chip:hover { color: var(--white); }
  .info-chip:hover::before { transform: scaleX(1); }

  .cta-btn {
    display: inline-block; background: var(--pink); color: var(--white);
    font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 0.14em;
    padding: 1rem 3.2rem; text-decoration: none; position: relative; z-index: 2;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 7px 7px 0 rgba(224,48,96,0.28);
    animation: fadeUp 0.8s 0.5s both;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }
  .cta-btn:hover { transform: translate(-3px,-3px); box-shadow: 10px 10px 0 rgba(224,48,96,0.38); }

  /* SECTIONS */
  section { padding: 5rem 2rem; position: relative; overflow: hidden; }
  .section-inner { max-width: 960px; margin: 0 auto; position: relative; z-index: 2; }
  .section-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.82rem; letter-spacing: 0.35em; color: var(--pink); margin-bottom: 0.4rem; text-transform: uppercase; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1; margin-bottom: 1.5rem; }

  /* ABOUT */
  .about { background: var(--dark); border-top: 3px solid var(--green); }
  .about-deco { position: absolute; right: -60px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; opacity: 0.13; pointer-events: none; }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3.5rem; align-items: center; }
  .about-text p { font-size: 1.15rem; line-height: 1.75; color: #bbb; margin-bottom: 1rem; }
  .age-badge { display: inline-block; background: var(--green); color: var(--white); font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.1em; padding: 0.5rem 1.4rem; margin-top: 0.5rem; }
  .stat-cards { display: flex; flex-direction: column; gap: 1rem; }
  .stat-card { background: var(--black); border-left: 4px solid var(--pink); padding: 1.2rem 1.5rem; position: relative; overflow: hidden; transition: transform 0.25s; }
  .stat-card:hover { transform: translateX(4px); }
  .stat-card::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, var(--green-bright), transparent); }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; line-height: 1; }
  .stat-label { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey); margin-top: 0.2rem; }

  /* ACTIVITIES */
  .activities { background: var(--black); border-top: 3px solid var(--pink); }
  .activities-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 2.5rem; }
  .activity-card { background: var(--dark); border: 1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden; transition: transform 0.3s, border-color 0.3s; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  .activity-card:hover { transform: translateY(-5px); border-color: rgba(74,170,74,0.3); }
  .activity-svg-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .activity-label { position: relative; z-index: 2; background: rgba(10,10,10,0.88); width: 100%; text-align: center; padding: 0.7rem 0.5rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.1em; border-top: 2px solid var(--green); line-height: 1.1; }
  @media (max-width: 700px) {
    .activities-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .activity-label { font-size: 1.1rem; padding: 0.65rem 0.4rem; letter-spacing: 0.06em; }
  }

  /* DETAILS */
  .details { background: var(--dark); border-top: 3px solid var(--green); }
  .details-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
  .detail-card { background: var(--black); padding: 2rem 1.5rem; border: 1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden; transition: transform 0.25s, border-color 0.25s; }
  .detail-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--green-bright); }
  .detail-card:hover { transform: translateY(-4px); border-color: rgba(74,170,74,0.35); }
  .detail-svg { width: 44px; height: 44px; margin-bottom: 0.8rem; }
  .detail-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 0.08em; color: var(--pink); margin-bottom: 0.4rem; }
  .detail-card p { font-size: 1rem; font-weight: 600; color: #bbb; line-height: 1.55; }

  /* SIGNUP */
  .signup { background: var(--green); position: relative; overflow: hidden; text-align: center; }
  .signup-art { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.15; }
  .signup-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5.5rem); letter-spacing: 0.05em; line-height: 1; position: relative; z-index: 1; margin-bottom: 1rem; }
  .signup p { font-size: 1.2rem; font-weight: 600; color: rgba(255,255,255,0.88); max-width: 520px; margin: 0 auto 2rem; position: relative; z-index: 1; line-height: 1.6; }
  .signup-btn { display: inline-block; background: var(--black); color: var(--white); font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; letter-spacing: 0.12em; padding: 1.1rem 3.8rem; text-decoration: none; position: relative; z-index: 1; transition: transform 0.2s, box-shadow 0.2s, background 0.2s; box-shadow: 7px 7px 0 rgba(0,0,0,0.3); clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px)); }
  .signup-btn:hover { transform: translate(-3px,-3px); box-shadow: 10px 10px 0 rgba(0,0,0,0.4); background: var(--pink); }

  /* SOCIAL */
  .social { background: var(--dark); border-top: 3px solid var(--green); text-align: center; }
  .social-links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
  .social-link { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 2.2rem; border: 2px solid rgba(255,255,255,0.14); text-decoration: none; color: var(--white); font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.1em; transition: all 0.3s; position: relative; overflow: hidden; }
  .social-link::before { content: ''; position: absolute; inset: 0; background: var(--pink); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s ease; z-index: -1; }
  .social-link:hover { border-color: var(--pink); }
  .social-link:hover::before { transform: scaleY(1); }
  .social-link svg { width: 26px; height: 26px; fill: currentColor; flex-shrink: 0; }
  .social-link.fb { border-color: rgba(74,170,74,0.4); }
  .social-link.fb .icon { color: var(--green-bright); transition: color 0.3s; }
  .social-link.ig { border-color: rgba(224,48,96,0.4); }
  .social-link.ig .icon { color: var(--pink); transition: color 0.3s; }
  .social-link:hover .icon { color: var(--white); }

  footer { background: var(--black); border-top: 1px solid rgba(255,255,255,0.06); padding: 2rem; text-align: center; }
  footer p { font-size: 0.88rem; color: var(--grey); letter-spacing: 0.05em; }
  footer strong { color: var(--pink); }

  @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 700px) {
    .about-grid { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .torn-banner { padding: 1rem 1.5rem 1.2rem; }
    .about-deco { display: none; }
  }
  @media (max-width: 420px) { .activities-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">The <span>Hangout</span></div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#activities">Activities</a></li>
    <li><a href="#details">When &amp; Where</a></li>
    <li><a href="#signup">Sign Up</a></li>
    <li><a href="#social">Find Us</a></li>
  </ul>
</nav>

<!-- HERO -->
<div class="hero" style="padding-top:80px;">
  <div class="hero-grid"></div>

  <!-- Hero SVG: atmospheric spray art -->
  <!-- Responsive background: CSS-based so it works on all screen sizes -->
  <div class="hero-art">
    <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="gG1" cx="50%" cy="0%" r="70%"><stop offset="0%" stop-color="#4aaa4a" stop-opacity="0.45"/><stop offset="100%" stop-color="#4aaa4a" stop-opacity="0"/></radialGradient>
        <radialGradient id="gP1" cx="85%" cy="90%" r="50%"><stop offset="0%" stop-color="#e03060" stop-opacity="0.4"/><stop offset="100%" stop-color="#e03060" stop-opacity="0"/></radialGradient>
        <radialGradient id="gP2" cx="15%" cy="80%" r="40%"><stop offset="0%" stop-color="#e03060" stop-opacity="0.25"/><stop offset="100%" stop-color="#e03060" stop-opacity="0"/></radialGradient>
        <radialGradient id="gSprayG1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4aaa4a" stop-opacity="0.65"/><stop offset="60%" stop-color="#4aaa4a" stop-opacity="0.1"/><stop offset="100%" stop-color="#4aaa4a" stop-opacity="0"/></radialGradient>
        <radialGradient id="gSprayG2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4aaa4a" stop-opacity="0.55"/><stop offset="60%" stop-color="#4aaa4a" stop-opacity="0.08"/><stop offset="100%" stop-color="#4aaa4a" stop-opacity="0"/></radialGradient>
        <radialGradient id="gSprayP1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e03060" stop-opacity="0.6"/><stop offset="60%" stop-color="#e03060" stop-opacity="0.1"/><stop offset="100%" stop-color="#e03060" stop-opacity="0"/></radialGradient>
        <radialGradient id="gSprayP2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e03060" stop-opacity="0.5"/><stop offset="60%" stop-color="#e03060" stop-opacity="0.08"/><stop offset="100%" stop-color="#e03060" stop-opacity="0"/></radialGradient>
        <filter id="b1"><feGaussianBlur stdDeviation="1.5"/></filter>
        <filter id="b3"><feGaussianBlur stdDeviation="3"/></filter>
        <filter id="b6"><feGaussianBlur stdDeviation="6"/></filter>
      </defs>

      <!-- big atmospheric glows -->
      <ellipse cx="50" cy="5" rx="60" ry="35" fill="url(#gG1)" filter="url(#b6)"/>
      <ellipse cx="85" cy="90" rx="35" ry="28" fill="url(#gP1)" filter="url(#b6)"/>
      <ellipse cx="15" cy="80" rx="25" ry="20" fill="url(#gP2)" filter="url(#b6)"/>

      <!-- spray splat TL (green) -->
      <ellipse cx="7" cy="14" rx="12" ry="10" fill="url(#gSprayG1)" filter="url(#b3)"/>
      <circle cx="7" cy="14" r="3.5" fill="#4aaa4a" opacity="0.22" filter="url(#b1)"/>
      <circle cx="4" cy="11" r="1.1" fill="#4aaa4a" opacity="0.3"/>
      <circle cx="10" cy="17" r="0.8" fill="#4aaa4a" opacity="0.25"/>
      <circle cx="13" cy="12" r="0.6" fill="#4aaa4a" opacity="0.2"/>
      <circle cx="3" cy="18" r="0.5" fill="#4aaa4a" opacity="0.18"/>

      <!-- spray splat BR (pink) -->
      <ellipse cx="93" cy="87" rx="13" ry="11" fill="url(#gSprayP1)" filter="url(#b3)"/>
      <circle cx="93" cy="87" r="4" fill="#e03060" opacity="0.24" filter="url(#b1)"/>
      <circle cx="89" cy="83" r="1.3" fill="#e03060" opacity="0.3"/>
      <circle cx="97" cy="91" r="0.9" fill="#e03060" opacity="0.24"/>
      <circle cx="98" cy="84" r="0.6" fill="#e03060" opacity="0.2"/>

      <!-- spray splat TR (green) -->
      <ellipse cx="90" cy="12" rx="9" ry="7.5" fill="url(#gSprayG2)" filter="url(#b3)" opacity="0.8"/>
      <circle cx="87" cy="9" r="0.9" fill="#4aaa4a" opacity="0.24"/>
      <circle cx="93" cy="15" r="0.6" fill="#4aaa4a" opacity="0.2"/>

      <!-- spray splat BL (pink) -->
      <ellipse cx="12" cy="86" rx="9" ry="7" fill="url(#gSprayP2)" filter="url(#b3)" opacity="0.7"/>
      <circle cx="9" cy="83" r="1" fill="#e03060" opacity="0.22"/>

      <!-- rotated square frame left -->
      <rect x="1" y="38" width="18" height="18" rx="0.8" fill="none" stroke="#4aaa4a" stroke-width="0.25" opacity="0.18" transform="rotate(20,10,47)"/>
      <rect x="3" y="40" width="14" height="14" rx="0.5" fill="none" stroke="#4aaa4a" stroke-width="0.15" opacity="0.1" transform="rotate(20,10,47)"/>

      <!-- diamond TR -->
      <polygon points="90,4 96,13 90,22 84,13" fill="none" stroke="#e03060" stroke-width="0.28" opacity="0.22"/>
      <polygon points="90,6 95,13 90,20 85,13" fill="none" stroke="#e03060" stroke-width="0.15" opacity="0.13"/>

      <!-- triangle top-centre -->
      <polygon points="50,2 57,12 43,12" fill="none" stroke="#e03060" stroke-width="0.2" opacity="0.16"/>

      <!-- cross marks (green) -->
      <g stroke="#4aaa4a" stroke-width="0.3" opacity="0.2" stroke-linecap="round">
        <line x1="82" y1="7" x2="82" y2="11"/><line x1="80" y1="9" x2="84" y2="9"/>
        <line x1="18" y1="86" x2="18" y2="90"/><line x1="16" y1="88" x2="20" y2="88"/>
        <line x1="28" y1="22" x2="28" y2="26"/><line x1="26" y1="24" x2="30" y2="24"/>
      </g>
      <!-- cross marks (pink) -->
      <g stroke="#e03060" stroke-width="0.3" opacity="0.18" stroke-linecap="round">
        <line x1="70" y1="19" x2="70" y2="23"/><line x1="68" y1="21" x2="72" y2="21"/>
        <line x1="5" y1="54" x2="5" y2="58"/><line x1="3" y1="56" x2="7" y2="56"/>
      </g>

      <!-- slashes (green) -->
      <g stroke="#4aaa4a" stroke-width="0.4" opacity="0.12" stroke-linecap="round">
        <line x1="83" y1="40" x2="88" y2="52"/>
        <line x1="85" y1="40" x2="90" y2="52"/>
        <line x1="87" y1="40" x2="92" y2="52"/>
      </g>
      <!-- slashes (pink) -->
      <g stroke="#e03060" stroke-width="0.4" opacity="0.12" stroke-linecap="round">
        <line x1="10" y1="58" x2="14" y2="68"/>
        <line x1="12" y1="58" x2="16" y2="68"/>
      </g>

      <!-- concentric rings BL -->
      <circle cx="8" cy="97" r="14" fill="none" stroke="#4aaa4a" stroke-width="0.2" opacity="0.14"/>
      <circle cx="8" cy="97" r="10" fill="none" stroke="#4aaa4a" stroke-width="0.15" opacity="0.1"/>
      <circle cx="8" cy="97" r="6" fill="none" stroke="#4aaa4a" stroke-width="0.15" opacity="0.07"/>

      <!-- starburst -->
      <g transform="translate(77,30)" stroke="#4aaa4a" stroke-width="0.25" opacity="0.18" stroke-linecap="round">
        <line x1="0" y1="
